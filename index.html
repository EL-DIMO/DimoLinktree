<!DOCTYPE html>

<head>

  <!-- Google Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:'Poppins',sans-serif;
    }

    body{
      min-height:100vh;
      overflow:hidden;
      display:flex;
      justify-content:center;
      align-items:center;
      background:#020024;
      position:relative;
    }

    /* BACKGROUND BLOBS */

    .blob{
      position:absolute;
      border-radius:50%;
      filter:blur(60px);
      opacity:0.9;
      animation:float 10s ease-in-out infinite;
    }

    .blob1{
      width:500px;
      height:500px;
      background:linear-gradient(180deg,#6f7cff,#3f2bff);
      top:-180px;
      left:-120px;
    }

    .blob2{
      width:450px;
      height:450px;
      background:linear-gradient(180deg,#1f5eff,#6d4dff);
      bottom:-180px;
      left:-100px;
      animation-delay:3s;
    }

    .blob3{
      width:450px;
      height:450px;
      background:linear-gradient(180deg,#0015ff,#7f5cff);
      right:-150px;
      bottom:-120px;
      animation-delay:5s;
    }

    @keyframes float{
      0%{
        transform:translateY(0px) translateX(0px);
      }
      50%{
        transform:translateY(20px) translateX(10px);
      }
      100%{
        transform:translateY(0px) translateX(0px);
      }
    }

    /* MAIN CARD */

    .container{
      position:relative;
      z-index:2;
      width:90%;
      max-width:420px;
      padding:35px 30px;
      border-radius:40px;

      background:rgba(255,255,255,0.08);

      backdrop-filter:blur(25px);
      -webkit-backdrop-filter:blur(25px);

      border:1px solid rgba(255,255,255,0.15);

      box-shadow:
      0 8px 32px rgba(0,0,0,0.35),
      inset 0 1px 1px rgba(255,255,255,0.2);

      text-align:center;
    }

    /* SHINY EFFECT */

    .container::before{
      content:'';
      position:absolute;
      top:0;
      left:-120%;
      width:100%;
      height:100%;
      background:linear-gradient(
      120deg,
      transparent,
      rgba(255,255,255,0.35),
      transparent
      );

      transform:skewX(-25deg);
      animation:shine 7s infinite;
    }

    @keyframes shine{
      0%{
        left:-120%;
      }
      100%{
        left:140%;
      }
    }

    /* PROFILE */

    .profile-img{
      width:120px;
      height:120px;
      border-radius:50%;
      object-fit:cover;
      border:3px solid rgba(255,255,255,0.25);

      box-shadow:
      0 0 25px rgba(255,255,255,0.15);

      margin-bottom:18px;
    }

    h1{
      color:#fff;
      font-size:30px;
      font-weight:600;
      letter-spacing:1px;
    }

    p{
      color:#d6d6ff;
      margin-top:8px;
      margin-bottom:35px;
      font-size:14px;
    }

    /* LINKS */

    .links{
      display:flex;
      flex-direction:column;
      gap:18px;
    }

    .link-btn{
      position:relative;

      display:flex;
      align-items:center;
      justify-content:center;
      gap:12px;

      padding:17px;
      border-radius:22px;

      text-decoration:none;
      color:white;
      font-size:16px;
      font-weight:500;

      background:rgba(255,255,255,0.07);

      backdrop-filter:blur(18px);

      border:1px solid rgba(255,255,255,0.12);

      overflow:hidden;

      transition:0.35s ease;
    }

    /* BUTTON GLOW */

    .link-btn::before{
      content:'';
      position:absolute;
      width:130%;
      height:100%;

      background:linear-gradient(
      120deg,
      transparent,
      rgba(255,255,255,0.18),
      transparent
      );

      top:0;
      left:-140%;

      transition:0.6s;
    }

    .link-btn:hover::before{
      left:120%;
    }

    .link-btn:hover{
      transform:translateY(-4px) scale(1.02);

      background:rgba(255,255,255,0.12);

      box-shadow:
      0 10px 30px rgba(0,0,0,0.35);
    }

    .link-btn i{
      font-size:20px;
    }

    /* FOOTER */

    .footer{
      margin-top:28px;
      font-size:12px;
      color:#d4d4ff;
      opacity:0.8;
    }

    /* MOBILE */

    @media(max-width:500px){

      .container{
        padding:28px 20px;
      }

      h1{
        font-size:25px;
      }

      .link-btn{
        font-size:15px;
      }
    }

  </style>
